<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 方眼紙背景 -->
  <rect width="64" height="64" rx="8" fill="#ffffff"/>
  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-strong" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="64" height="64" rx="8" fill="url(#grid)"/>
  <rect width="64" height="64" rx="8" fill="url(#grid-strong)"/>
  <!-- 枠線（ノート風） -->
  <rect x="1" y="1" width="62" height="62" rx="7" fill="none" stroke="#111" stroke-width="2"/>
  <!-- 手書き風「ス」 -->
  <text x="32" y="46" text-anchor="middle" font-family="'Yomogi','Klee One',sans-serif" font-size="40" font-weight="600" fill="#111" style="paint-order:stroke" stroke="#111" stroke-width="0.5">ス</text>
</svg>
