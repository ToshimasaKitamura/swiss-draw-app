<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 方眼紙背景 -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <defs>
    <pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(0,0,0,0.10)" stroke-width="0.5"/>
    </pattern>
    <pattern id="gs" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect width="1200" height="630" fill="url(#gs)"/>

  <!-- 外枠 -->
  <rect x="24" y="24" width="1152" height="582" rx="12" fill="none" stroke="#111" stroke-width="3"/>

  <!-- タイトル -->
  <text x="600" y="260" text-anchor="middle" font-family="'Yomogi','Klee One','Kaisei Decol',sans-serif" font-size="80" font-weight="700" fill="#111">スイスイドロー工房</text>

  <!-- サブタイトル -->
  <text x="600" y="340" text-anchor="middle" font-family="'Yomogi','Klee One',sans-serif" font-size="32" fill="#444">手書き風UIのスイスドロー大会管理アプリ</text>

  <!-- 装飾ライン -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="#111" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- フッターテキスト -->
  <text x="600" y="440" text-anchor="middle" font-family="'Yomogi','Klee One',sans-serif" font-size="24" fill="#6b6b6b">ブラウザだけで動く・無料・登録不要</text>
</svg>
